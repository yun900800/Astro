<img src="/assets/images/20250219.jpg" alt="说明： 恒星和行星是如何形成的？ 韦伯太空望远镜携手哈伯太空望远镜及地面的ALMA阵列（阿塔卡马大型毫米波/次毫米波阵列），在原行星系统HH30内，找到如何回答上述提问的新线索。它们的观测的成果之一，是发现于HH30里，大颗粒尘埃密集在可形成行星的中央盘面上。这幅由韦伯望远镜所拍摄的主题影像，呈现了活跃的HH30系统之诸多特征构造。影像中可清楚见到的，有垂直于盘面喷出的粒子喷流（红色），而横跨中央富含尘埃的暗盘，则遮掩了仍处在形成阶段的恒星（或多颗恒星）所发出的星光。中央盘面上方及下方的抛物线状光弧，则是尘埃反射恒星的星光所形成的泛蓝尘埃云。至于左下方的尾状结构从何而来，目前仍然是一个未解之谜。透过研究 HH 30的行星是如何形成的，有助于天文学家深入了解我们太阳系里的地球及其他行星当初形成的奥秘。" title="说明： 恒星和行星是如何形成的？ 韦伯太空望远镜携手哈伯太空望远镜及地面的ALMA阵列（阿塔卡马大型毫米波/次毫米波阵列），在原行星系统HH30内，找到如何回答上述提问的新线索。它们的观测的成果之一，是发现于HH30里，大颗粒尘埃密集在可形成行星的中央盘面上。这幅由韦伯望远镜所拍摄的主题影像，呈现了活跃的HH30系统之诸多特征构造。影像中可清楚见到的，有垂直于盘面喷出的粒子喷流（红色），而横跨中央富含尘埃的暗盘，则遮掩了仍处在形成阶段的恒星（或多颗恒星）所发出的星光。中央盘面上方及下方的抛物线状光弧，则是尘埃反射恒星的星光所形成的泛蓝尘埃云。至于左下方的尾状结构从何而来，目前仍然是一个未解之谜。透过研究 HH 30的行星是如何形成的，有助于天文学家深入了解我们太阳系里的地球及其他行星当初形成的奥秘。">    <div class="not-prose" id="giscus-container" data-astro-cid-t3avhtp4> <div id="giscus" data-astro-cid-t3avhtp4></div> </div> <script>(function(){const path = "/posts/20250318_有形成中行星的恒星系统/";
